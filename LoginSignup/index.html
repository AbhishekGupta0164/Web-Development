<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="index.js"></script>  
  <title>Login & Signup Form</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f2f2f2;
    }

    .container{
      width: 350px;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    h2{
      text-align: center;
      margin-bottom: 20px;
    }

    form{
      display: flex;
      flex-direction: column;
    }

    input{
      margin: 10px 0;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      outline: none;
    }

    button{
      padding: 10px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover{
      background: #0056b3;
    }

    .signup{
      margin-top: 30px;
    }
  </style>
</head>
 
<body> 

  <div class="container">

    <!-- Login Form --> 
    <h2>Login</h2>
    <form>
      <input type="email" placeholder="Enter Email" required>
      <input type="password" placeholder="Enter Password" required>
      <button type="submit">Login</button>
    </form>

    <!-- Signup Form -->
     <div class="signup">
      <h2>Signup</h2>
      <form>
        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Enter Email" required>
        <input type="password" placeholder="Create Password" required>
        <button type="submit">Signup</button>
      </form>
    </div> 

  </div>

</body>
</html>
