function buildCells(calYear, calMonth) {
  var firstDayIdx = new Date(calYear, calMonth, 1).getDay();
  var daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  var cells = [];
  var prevDays = new Date(calYear, calMonth, 0).getDate();
  for(var i = firstDayIdx - 1; i >= 0; i--){
    var dayNum = prevDays - i;
    var pMonth = calMonth === 0 ? 12 : calMonth;
    var pYear = calMonth === 0 ? calYear - 1 : calYear;
    var mStr = pMonth < 10 ? '0' + pMonth : pMonth;
    var dStr = pYear + '-' + mStr + '-' + (dayNum < 10 ? '0' : '') + dayNum;
    cells.push({ day: dayNum, dateStr: dStr, isCurrent: false });
  }
  for(var i = 1; i <= daysInMonth; i++){
    var mStr = (calMonth + 1) < 10 ? '0' + (calMonth + 1) : (calMonth + 1);
    var dStr = calYear + '-' + mStr + '-' + (i < 10 ? '0' : '') + i;
    cells.push({ day: i, dateStr: dStr, isCurrent: true });
  }
  var nextPadding = 42 - cells.length;
  for(var i = 1; i <= nextPadding; i++){
    var nMonth = calMonth + 2;
    var nYear = calYear;
    if(nMonth > 12) { nMonth = 1; nYear = calYear + 1; }
    var mStr = nMonth < 10 ? '0' + nMonth : nMonth;
    var dStr = nYear + '-' + mStr + '-' + (i < 10 ? '0' : '') + i;
    cells.push({ day: i, dateStr: dStr, isCurrent: false });
  }
  return cells;
}

{tab==='history'&&(
  <div className="slide" style={{maxWidth:900,margin:'0 auto'}}>

      <div>
        <div style={{fontSize:14,fontWeight:900,color:'#A78BFA',marginBottom:4}}>📜 Chronological Activity Tracker</div>

        <button onClick={triggerSync} disabled={syncStatus==='syncing'} style={{fontSize:9.5,padding:'5px 11px',borderRadius:6,background:'rgba(251,191,36,.12)',color:'#FBBF24',border:'1px solid rgba(251,191,36,.3)',fontWeight:600}}>💾 Backup Now</button>
      </div>
    </div>

    {/* Filters */}
    <div className="card" style={{padding:12,marginBottom:12,display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
      <span style={{fontSize:9.5,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',marginRight:4}}>Filter:</span>

        style={{background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:6,padding:'4px 8px',color:'#f8fafc',fontSize:10.5,flex:1,minWidth:150}}

    </div>

    {/* Timeline Grid */}

      {(() => {
        var parsedEvents = [];
        
        // 1. Daily Study Logs
        Object.keys(daily).forEach(function(dateStr){
          var log = daily[dateStr];
          if(log){
            parsedEvents.push({
              time: log.ts || (dateStr + ' 22:00'),
              dateLabel: dateStr,
              type: 'journal',
              icon: '📝',
              color: '#10B981',
              title: 'Daily Study Journal Logged',
              desc: 'Spent ' + log.hours + 'h studying ' + (log.subjects && log.subjects.length ? log.subjects.join(', ') : 'general') + '. Target Completion: ' + log.done + '%.',
              notes: log.notes,
              mood: log.mood
            });
          }
        });

        // 2. Focus Timer Sessions
        pomoHistory.forEach(function(p){
          parsedEvents.push({
            time: p.dt,
            dateLabel: p.dt.split(' ')[0],
            type: 'focus',
            icon: '⏱️',
            color: '#F59E0B',
            title: 'Focus Block Completed',
            desc: 'Completed a ' + p.dur + ' min focus block for ' + p.sub + ' (' + p.status + ').'
          });
        });

        // 3. Topics Completed
        subs.forEach(function(s){
          s.u.forEach(function(u){
            u.t.forEach(function(t){
              if(t.s === 'D' && t.d){
                parsedEvents.push({
                  time: t.d,
                  dateLabel: t.d.split(' ')[0],
                  type: 'topic',
                  icon: '✅',
                  color: s.c,
                  title: 'Syllabus Topic Completed',
                  desc: s.nm + ' → ' + u.nm + ' → ' + t.n
                });
              }
            });
          });
        });

        // 4. Backlog Added
        missed.forEach(function(dateStr){
          parsedEvents.push({
            time: dateStr + ' 00:00',
            dateLabel: dateStr,
            type: 'backlog',
            icon: '⚠️',
            color: '#EF4444',
            title: 'Backlog Registered',
            desc: 'Day marked as missed / backlog added.'
          });
        });

        // 5. Mock Tests Taken
        mocks.forEach(function(m){
          if(m.sc !== null && m.dt){
            parsedEvents.push({
              time: m.dt,
              dateLabel: m.dt.split(' ')[0],
              type: 'mock',
              icon: '🎯',
              color: '#F472B6',
              title: 'Mock Test Completed',
              desc: 'Scored ' + m.sc + '% on Mock #' + m.n + ' (Rank: ' + (m.rk || 'N/A') + ').',
              notes: m.notes
            });
          }
        });

        // Parse Time Function
        function parseLogTime(t){
          if(!t) return 0;
          if(t.includes('T') && t.includes('Z')) return new Date(t).getTime();
          try {
            var parts = t.split(' ');
            var dateParts = parts[0].split('-');
            var day = parseInt(dateParts[0]);
            var monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            var month = monthNames.indexOf(dateParts[1]);
            if(month === -1) month = 5;
            var year = new Date().getFullYear();
            var hour = 12, min = 0;
            if(parts[1]){
              var timeParts = parts[1].split(':');
              hour = parseInt(timeParts[0]);
              min = parseInt(timeParts[1]);
              if(parts[2] && parts[2].toLowerCase() === 'pm' && hour < 12) hour += 12;
              if(parts[2] && parts[2].toLowerCase() === 'am' && hour === 12) hour = 0;
            }
            return new Date(year, month, day, hour, min).getTime();
          } catch(e) { return 0; }
        }

        // Sort events
        parsedEvents.sort(function(a,b){
          return parseLogTime(b.time) - parseLogTime(a.time);
        });

        // Filter events
        var filteredEvents = parsedEvents.filter(function(e){
          if(tyF !== 'ALL' && e.type !== tyF) return false;
          if(filt.q){
            var q = filt.q.toLowerCase();
            var inTitle = e.title.toLowerCase().includes(q);
            var inDesc = e.desc.toLowerCase().includes(q);
            var inNotes = e.notes ? e.notes.toLowerCase().includes(q) : false;
            return inTitle || inDesc || inNotes;
          }
          return true;
        });

        if(filteredEvents.length === 0){
          return <div style={{textAlign:'center',padding:40,color:'#64748b',fontSize:12}}>No activities logged yet or matches found.</div>;
        }

        return filteredEvents.map(function(ev, idx){
          var dispTime = ev.time;
          if(ev.time.includes('T') && ev.time.includes('Z')){
            var dObj = new Date(ev.time);
            dispTime = fmtD(dObj) + ' ' + dObj.toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit'});
          }
          
          return (
            <div key={idx} className="slide" style={{position:'relative',marginBottom:12}}>
              {/* Event indicator dot */}
              <div style={{
                position:'absolute',
                left:-19,
                top:6,
                width:12,
                height:12,
                borderRadius:'50%',
                background:ev.color,
                border:'2.5px solid #020617',
                boxShadow:'0 0 6px '+ev.color
              }}/>
              
              <div className="card" style={{padding:'9px 12px',marginLeft:6}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4,flexWrap:'wrap',gap:5}}>
                  <div style={{display:'flex',alignItems:'center',gap:5}}>
                    <span style={{fontSize:12}}>{ev.icon}</span>
                    <span style={{fontSize:11.5,fontWeight:800,color:'#f8fafc'}}>{ev.title}</span>
                  </div>
                  <span className="mono" style={{fontSize:8.5,color:'#94a3b8'}}>{dispTime}</span>
                </div>
                
                <div style={{fontSize:10.5,color:'#cbd5e1',lineHeight:1.4}}>{ev.desc}</div>
                
                {ev.notes && (
                  <div style={{marginTop:6,background:'rgba(255,255,255,.015)',borderLeft:'2.5px solid '+ev.color+'60',padding:'5px 8px',borderRadius:'0 4px 4px 0',fontSize:9.5,color:'#94a3b8',fontStyle:'italic',lineHeight:1.35}}>
                    "{ev.notes}"
                  </div>
                )}
                
                {ev.mood && (
                  <div style={{marginTop:4,fontSize:9.5,color:'#94a3b8'}}>
                    Logged mood: <span style={{fontSize:12}}>{MOODS[ev.mood-1]}</span> ({['Stressed','Tired','Neutral','Happy','Energetic'][ev.mood-1]})
                  </div>
                )}
              </div>
            </div>
          );
        });
      })()}
    </div>
  </div>
)}
