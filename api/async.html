<!DOCTYPE html>
<html lang="en">
<head>

<body>

<h2 id="h2"></h2>

<script>
fetch("https://jsonplaceholder.typicode.com/todos")
.then((data)=>{
    return data.json();   // convert response to JSON
})
.then((val)=>{
    console.log(val);

    let h2 = document.getElementById("h2");

    val.forEach((item)=>{
        h2.innerHTML += item.title + "<br><br>";
    });
})
.catch((err)=>{
    console.log(err);
});

const iageEl = document.querySelector('img');
let num =0;
setInterval(()=>{
    num++;
    iageEl.src = `https://picsum.photos/200/300?random=${num}`;
},1000) 
</script>
