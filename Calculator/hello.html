<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>

  <style>
    *{
      margin:0;

      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#111;
    }

    .calculator{
      width:320px;
      background:black;
      padding:20px;
      border-radius:35px;
    }

    #display{
      width:100%;
      height:100px;
      border:none;
      background:black;
      color:white;
      font-size:50px;
      text-align:right;
      padding:10px;
      margin-bottom:20px;
      outline:none;
    }

    .buttons{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
    }

    button{
      width:65px;
      height:65px;
      border:none;
      border-radius:50%;
      font-size:26px;
      cursor:pointer;
      color:white;
    }

    .gray{
      background:#a5a5a5;
      color:black;
    }

    .dark{
      background:#333333;
    }

    .orange{
      background:#ff9f0a;
    }

    .zero{
      grid-column:span 2;
      width:140px;
      border-radius:40px;
      text-align:left;
      padding-left:25px;
    }
  </style>
</head>

<body>

  <div class="calculator">
    
    <input type="text" id="display" value="0" disabled>

    <div class="buttons">
      <button class="gray" onclick="clearDisplay()">AC</button>
          <button class="gray" onclick="clearDigit()">C</button>
      <button class="gray">+/-</button>
      <button class="orange" onclick="append('/')">÷</button>

      <button class="dark" onclick="append('7')">7</button>
      <button class="dark" onclick="append('8')">8</button>
      <button class="dark" onclick="append('9')">9</button>
      <button class="orange" onclick="append('*')">×</button>

      <button class="dark" onclick="append('4')">4</button>
      <button class="dark" onclick="append('5')">5</button>
      <button class="dark" onclick="append('6')">6</button>
      <button class="orange" onclick="append('-')">−</button>

      <button class="dark" onclick="append('1')">1</button>
      <button class="dark" onclick="append('2')">2</button>
      <button class="dark" onclick="append('3')">3</button>
      <button class="orange" onclick="append('+')">+</button>

      <button class="dark zero" onclick="append('0')">0</button>
      <button class="dark" onclick="append('.')">.</button>
      <button class="orange" onclick="calculate()">=</button>
    </div>

  </div>

    <script>
  let inp = document.querySelector("#display");
  let buttons = document.querySelectorAll("button");

  for (let btn of buttons) {

    btn.addEventListener("click", function () {

      let btnText = btn.innerText;

      if (btnText == "AC") {
        inp.value = "0";
      }
      if (btnText == "C") {
        inp.value = inp.value.slice(0, -1) || "0";
      }

      else if (btnText == "=") {

        try {
          inp.value = eval(
            inp.value
              .replace("×", "*")
              .replace("÷", "/")
              .replace("−", "-")
          );
        }

        catch {
          inp.value = "Error";
        }
      }

      else {

        if (inp.value == "0") {
          inp.value = "";
        }

        inp.value += btnText;
      }

    });

  }
    

  </script>

</body>
</html>
